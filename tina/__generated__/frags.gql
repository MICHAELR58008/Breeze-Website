fragment BookingParts on Booking {
  __typename
  pricingHub
  previewOpen
  services {
    __typename
    id
    name
    description
    subtitle
    features
    basePriceCents
    pricePerBedroomCents
    pricePerBathroomCents
  }
  addOns {
    __typename
    id
    name
    cents
  }
  theme {
    __typename
    fontFamily
    primaryColor
    backgroundColor
    textColor
    borderRadius
  }
  steps {
    __typename
    title
    description
    disabled
    showIfField
    showIfOperator
    showIfValue
    fields {
      __typename
      ... on BookingStepsFieldsTextInput {
        name
        label
        placeholder
        required
        validationType
      }
      ... on BookingStepsFieldsNumberInput {
        name
        label
        min
        max
      }
      ... on BookingStepsFieldsChoiceInput {
        name
        label
        options {
          __typename
          id
          label
        }
      }
      ... on BookingStepsFieldsDateInput {
        name
        label
      }
      ... on BookingStepsFieldsPhotoUpload {
        label
        prompt
        hint
        selectedText
        emptyText
      }
      ... on BookingStepsFieldsRichTextHeading {
        text
      }
      ... on BookingStepsFieldsServicesSelector {
        question
      }
      ... on BookingStepsFieldsAddonsSelector {
        question
      }
      ... on BookingStepsFieldsEstimateSummary {
        disclaimer
      }
      ... on BookingStepsFieldsImageBlock {
        src
        alt
        caption
        aspect
      }
      ... on BookingStepsFieldsInfoCard {
        title
        description
        icon
        variant
      }
      ... on BookingStepsFieldsInfoBanner {
        text
        type
        dismissible
      }
      ... on BookingStepsFieldsTextareaInput {
        name
        label
        placeholder
        required
        rows
      }
      ... on BookingStepsFieldsSelectInput {
        name
        label
        options {
          __typename
          value
          label
        }
        required
        defaultValue
      }
      ... on BookingStepsFieldsCheckboxGroup {
        name
        label
        options {
          __typename
          value
          label
          priceCents
        }
        required
      }
    }
  }
  header {
    __typename
    badge
    title
    description
  }
  stepNames
  timeWindows {
    __typename
    id
    label
  }
  reviewLabels {
    __typename
    heading
    rowHome
    rowDate
    rowWindow
    rowPhotos
    disclaimer
  }
  navigation {
    __typename
    back
    continue
    submit
  }
  success {
    __typename
    title
    message
    buttonText
  }
  estimate {
    __typename
    label
    customQuote
    disclaimer
  }
}
